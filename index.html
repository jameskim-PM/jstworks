<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSTWORKS — Korea to the World</title>
  <meta name="description" content="JOSHUA TREE WORKS (JSTWORKS) — Where Korean soul meets the world's shelf. Curating culture, not just products." />

  <!--
    Favicon — OS/브라우저 테마(light/dark)에 맞춰 자동 전환.
    [핵심] Chrome 등 일부 브라우저는 단순 href swap만으로 favicon 캐시를 다시
    fetch하지 않으므로, 변경 시마다 link 요소 자체를 새로 생성한다.
    URL에 ?t=dark/light 토큰을 부여해 브라우저 favicon 캐시를 분리한다.
  -->
  <script>
    (function () {
      var FAVICON_LIGHT = '/JoshuaTreeWorks_Logo_icon_Green.png'; // 라이트 — 녹색 로고
      var FAVICON_DARK  = '/JoshuaTreeWorks_Logo_icon_white.png'; // 다크 — 흰색 로고

      function isDarkMode() {
        return !!(window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches);
      }

      function applyFavicon() {
        var dark = isDarkMode();
        var href = (dark ? FAVICON_DARK : FAVICON_LIGHT) + '?t=' + (dark ? 'd' : 'l');

        // 기존 모든 favicon 링크 완전 제거 (head 어느 위치든)
        var existing = document.querySelectorAll(
          'link[rel~="icon"], link[rel="shortcut icon"], link[rel="apple-touch-icon"]'
        );
        for (var i = 0; i < existing.length; i++) {
          existing[i].parentNode.removeChild(existing[i]);
        }

        // 매번 새 link 요소 생성 — Chrome이 캐시 무시하고 재요청하도록 유도
        var link = document.createElement('link');
        link.rel  = 'icon';
        link.type = 'image/png';
        link.href = href;
        document.head.appendChild(link);
      }

      // 페이지 로드 즉시 적용
      applyFavicon();

      // OS/브라우저의 테마 변경 라이브 감지
      if (window.matchMedia) {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        if (typeof mq.addEventListener === 'function') {
          mq.addEventListener('change', applyFavicon);
        } else if (typeof mq.addListener === 'function') {
          mq.addListener(applyFavicon); // 구형 Safari fallback
        }
      }

      // 일부 브라우저는 탭이 비활성 상태였다가 다시 활성화될 때
      // 누락된 favicon 갱신을 트리거해야 표시됨 → visibilitychange로 보강
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') applyFavicon();
      });
    })();
  </script>
